swarm_mocap:
  ros__parameters:
    # server_ip: "192.168.1.71"       # PhaseSpace OWL server IP (from setup doc)
    # server_ip: "192.168.0.244"       # PhaseSpace OWL server IP (from setup doc)
    server_ip: "192.168.1.25"       # PhaseSpace OWL server IP (from setup doc)
    frame_id: "mocap"               # TF frame for all published poses
    # List rigid body IDs that should also get individual /mocap/rigid_{id} topics.
    # These are the IDs assigned by the PhaseSpace software — check the web UI.
    # Must include every ID listed under mocap_rigid_id in network.yaml.
    # Leave commented out (or omit) to publish only /mocap/rigids and /mocap/markers.
    published_rigid_ids: [0, 1, 2, 3, 4, 5]
